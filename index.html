<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>학원 관리 시스템</title>
  <meta name="theme-color" content="#178EF5">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}
    :root{--primary:#178EF5;--primary-dark:#1070C2;--success:#3B6D11;--danger:#E24B4A;--warning:#854F0B;--bg:#f5f6fa;--card:#fff;--border:#e8e9f0;--text:#1a1a2e;--muted:#6b7280}

    /* 로그인 화면 */
    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#667eea 0%,#178EF5 100%)}
    .login-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
    .login-logo{text-align:center;margin-bottom:24px}
    .login-logo h1{font-size:24px;font-weight:700;color:#1a1a2e;margin-top:8px}
    .login-logo p{font-size:14px;color:#6b7280;margin-top:4px}
    .role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .role-btn{padding:12px;border:2px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:all 0.2s;font-size:13px;font-weight:500}
    .role-btn.active{border-color:var(--primary);background:#E6F1FB;color:var(--primary)}
    .role-btn .icon{font-size:24px;display:block;margin-bottom:4px}
    .input-group{margin-bottom:14px}
    .input-group label{display:block;font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
    .input-group input,.input-group select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border 0.2s;background:#fff;color:#1a1a2e}
    .input-group input:focus,.input-group select:focus{border-color:var(--primary)}
    .btn-login{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}
    .btn-login:hover{background:var(--primary-dark)}

    /* 앱 레이아웃 */
    .app{display:none;flex-direction:column;min-height:100vh}
    .app.visible{display:flex}
    .header{background:#fff;padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header h1{font-size:17px;font-weight:700}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-badge{font-size:12px;color:#6b7280;background:#f5f6fa;padding:4px 10px;border-radius:100px}
    .logout-btn{font-size:13px;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px 8px}
    .content{flex:1;padding:16px;max-width:600px;margin:0 auto;width:100%}
    .bottom-nav{background:#fff;border-top:1px solid var(--border);display:flex;position:sticky;bottom:0}
    .nav-tab{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;font-size:11px;color:#9ca3af;border:none;background:none;transition:all 0.2s}
    .nav-tab.active{color:var(--primary)}
    .nav-tab .nav-icon{font-size:22px;display:block;margin-bottom:2px}

    /* 카드 */
    .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
    .card-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

    /* 통계 */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .stat-item{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
    .stat-item .sv{font-size:24px;font-weight:700}
    .stat-item .sl{font-size:11px;color:#6b7280;margin-top:2px}
    .blue{color:var(--primary)}
    .green{color:var(--success)}
    .red{color:var(--danger)}

    /* 버튼 */
    .btn{padding:8px 16px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1a1a2e;transition:all 0.2s}
    .btn:active{transform:scale(0.97)}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
    .btn-danger{color:var(--danger);border-color:#fecaca}
    .btn-full{width:100%;padding:14px;font-size:15px;border-radius:12px}

    /* 뱃지 */
    .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
    .badge-blue{background:#E6F1FB;color:#185FA5}
    .badge-green{background:#EAF3DE;color:#3B6D11}
    .badge-red{background:#FCEBEB;color:#A32D2D}
    .badge-amber{background:#FAEEDA;color:#854F0B}

    /* 학생 아이템 */
    .student-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .student-item:last-child{border-bottom:none}
    .avatar{width:38px;height:38px;border-radius:50%;background:#E6F1FB;color:#185FA5;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
    .student-info{flex:1}
    .student-name{font-size:14px;font-weight:600}
    .student-meta{font-size:12px;color:#6b7280;margin-top:2px}

    /* 진행 바 */
    .progress-bar{height:6px;background:#f0f0f0;border-radius:100px;overflow:hidden;margin:6px 0}
    .progress-fill{height:100%;border-radius:100px;transition:width 0.4s}

    /* 숙제 카드 */
    .hw-item{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
    .hw-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
    .hw-title{font-size:14px;font-weight:600}
    .hw-meta{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;gap:10px;flex-wrap:wrap}

    /* 제출 학생 목록 */
    .submit-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .submit-chip{padding:4px 10px;border-radius:100px;font-size:12px;cursor:pointer;transition:all 0.2s}

    /* 사진 제출 */
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .photo-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer}
    .photo-thumb img{width:100%;height:100%;object-fit:cover}
    .upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fafafa}
    .upload-area:active{background:#E6F1FB;border-color:var(--primary)}
    .upload-area .ua-icon{font-size:32px;margin-bottom:6px}
    .upload-area p{font-size:13px;color:#6b7280}

    /* 알림 박스 */
    .alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
    .alert-warning{background:#FAEEDA;color:#854F0B;border:1px solid #FAC775}
    .alert-info{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4}

    /* 모달 */
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
    .modal-backdrop.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
    .modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:100px;margin:0 auto 16px}
    .modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:#fff;color:#1a1a2e;transition:border 0.2s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}

    /* 이미지 뷰어 */
    .img-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;align-items:center;justify-content:center}
    .img-viewer.open{display:flex}
    .img-viewer img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain}
    .img-viewer-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;width:40px;height:40px;border-radius:50%;cursor:pointer}

    /* 로딩 */
    .loading{text-align:center;padding:40px;color:#6b7280;font-size:14px}
    .spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* 패널 */
    .panel{display:none}
    .panel.active{display:block}

    /* 검색/필터 */
    .search-row{display:flex;gap:8px;margin-bottom:14px}
    .search-input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:#fff}
    .search-input:focus{border-color:var(--primary)}
    select.filter{padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;background:#fff;color:#1a1a2e}

    /* 학생용 숙제 */
    .my-hw-item{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
    .my-hw-status{display:flex;align-items:center;justify-content:space-between;margin-top:10px}

    @media(max-width:400px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div style="font-size:48px">🏫</div>
      <h1>학원 관리</h1>
      <p>Academy Manager</p>
    </div>
    <div class="role-select">
      <button class="role-btn active" id="roleTeacher" onclick="selectRole('teacher')">
        <span class="icon">👨‍🏫</span>선생님
      </button>
      <button class="role-btn" id="roleStudent" onclick="selectRole('student')">
        <span class="icon">👨‍🎓</span>학생
      </button>
    </div>
    <div class="input-group">
      <label>이름</label>
      <input type="text" id="loginName" placeholder="이름을 입력하세요">
    </div>
    <div class="input-group" id="classSelectWrap" style="display:none">
      <label>반 선택</label>
      <select id="loginClass">
        <option value="A반">A반</option>
        <option value="B반">B반</option>
      </select>
    </div>
    <button class="btn-login" onclick="login()">시작하기</button>
  </div>
</div>

<!-- 메인 앱 -->
<div class="app" id="mainApp">
  <div class="header">
    <h1 id="headerTitle">🏫 학원 관리</h1>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="content">
    <!-- 선생님 패널 -->
    <div id="teacherApp">
      <!-- 학생 관리 -->
      <div class="panel active" id="panel-students">
        <div class="stats-grid">
          <div class="stat-item"><div class="sv blue" id="st-total">-</div><div class="sl">전체 학생</div></div>
          <div class="stat-item"><div class="sv green" id="st-a">-</div><div class="sl">A반</div></div>
          <div class="stat-item"><div class="sv" id="st-b">-</div><div class="sl">B반</div></div>
        </div>
        <div class="card">
          <div class="card-title">학생 목록 <button class="btn btn-primary btn-sm" onclick="openModal('addStudent')">+ 추가</button></div>
          <div class="search-row">
            <input class="search-input" id="studentSearch" placeholder="이름 검색..." oninput="renderStudents()">
            <select class="filter" id="classFilter" onchange="renderStudents()">
              <option value="">전체</option>
              <option value="A반">A반</option>
              <option value="B반">B반</option>
            </select>
          </div>
          <div id="studentList"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
        </div>
      </div>

      <!-- 숙제 관리 -->
      <div class="panel" id="panel-homework">
        <div id="missingAlert"></div>
        <div class="card">
          <div class="card-title">숙제 목록 <button class="btn btn-primary btn-sm" onclick="openModal('addHomework')">+ 출제</button></div>
          <div id="homeworkList"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
        </div>
      </div>
    </div>

    <!-- 학생 패널 -->
    <div id="studentApp" style="display:none">
      <div class="panel active" id="panel-my-homework">
        <div id="myHwAlert"></div>
        <div class="card">
          <div class="card-title">📝 내 숙제</div>
          <div id="myHomeworkList"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 하단 네비게이션 (선생님) -->
  <nav class="bottom-nav" id="teacherNav">
    <button class="nav-tab active" onclick="switchTab('students',this,'teacherApp')" id="tab-students">
      <span class="nav-icon">👥</span>학생 관리
    </button>
    <button class="nav-tab" onclick="switchTab('homework',this,'teacherApp')" id="tab-homework">
      <span class="nav-icon">📝</span>숙제 관리
    </button>
  </nav>

  <!-- 하단 네비게이션 (학생) -->
  <nav class="bottom-nav" id="studentNav" style="display:none">
    <button class="nav-tab active" onclick="switchStudentTab('my-homework',this)">
      <span class="nav-icon">📝</span>내 숙제
    </button>
  </nav>
</div>

<!-- 모달들 -->
<!-- 학생 추가 -->
<div class="modal-backdrop" id="modal-addStudent">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>학생 추가</h3>
    <div class="form-group"><label>이름</label><input id="inp-sname" placeholder="홍길동"></div>
    <div class="form-group"><label>반</label>
      <select id="inp-sclass"><option value="A반">A반</option><option value="B반">B반</option></select>
    </div>
    <div class="form-group"><label>연락처</label><input id="inp-sphone" placeholder="010-0000-0000" type="tel"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-full" onclick="closeModal('addStudent')">취소</button>
      <button class="btn btn-primary btn-full" onclick="addStudent()">추가하기</button>
    </div>
  </div>
</div>

<!-- 숙제 출제 -->
<div class="modal-backdrop" id="modal-addHomework">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>숙제 출제</h3>
    <div class="form-group"><label>제목</label><input id="inp-htitle" placeholder="예) 수학 p.30~35"></div>
    <div class="form-group"><label>대상 반</label>
      <select id="inp-hclass"><option value="A반">A반</option><option value="B반">B반</option><option value="전체">전체</option></select>
    </div>
    <div class="form-group"><label>마감일</label><input type="date" id="inp-hdue"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-full" onclick="closeModal('addHomework')">취소</button>
      <button class="btn btn-primary btn-full" onclick="addHomework()">출제하기</button>
    </div>
  </div>
</div>

<!-- 사진 제출 모달 -->
<div class="modal-backdrop" id="modal-submitPhoto">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="submitPhotoTitle">숙제 제출</h3>
    <p id="submitPhotoSub" style="font-size:13px;color:#6b7280;margin-bottom:16px"></p>
    <div class="upload-area" onclick="document.getElementById('photoInput').click()">
      <div class="ua-icon">📷</div>
      <p><strong style="color:var(--primary)">사진 선택 또는 촬영</strong></p>
      <p>갤러리에서 선택하거나 카메라로 찍어주세요</p>
    </div>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotoSelect(event)">
    <div class="photo-grid" id="photoPreviewGrid"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-full" onclick="closeModal('submitPhoto')">취소</button>
      <button class="btn btn-primary btn-full" onclick="submitPhotos()">제출하기</button>
    </div>
  </div>
</div>

<!-- 이미지 뷰어 -->
<div class="img-viewer" id="imgViewer" onclick="closeImgViewer()">
  <button class="img-viewer-close" onclick="closeImgViewer()">✕</button>
  <img id="viewerImg" src="" alt="">
</div>

<script>
  // ===== Supabase 설정 =====
  const SUPABASE_URL = 'https://qtpftloyumtffvgurvqv.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_XGP9n-2fuBQFuJlAA5MJ8w_R8JYIi9O'; // ← 여기에 본인의 키 입력
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ===== 상태 =====
  let currentUser = null;
  let currentRole = 'teacher';
  let students = [];
  let homeworks = [];
  let submissions = [];
  let pendingPhotos = [];
  let currentSubmitHwId = null;
  let currentSubmitStudentId = null;

  // ===== 로그인 =====
  function selectRole(role) {
    currentRole = role;
    document.getElementById('roleTeacher').classList.toggle('active', role==='teacher');
    document.getElementById('roleStudent').classList.toggle('active', role==='student');
    document.getElementById('classSelectWrap').style.display = role==='student' ? 'block' : 'none';
  }

  async function login() {
    const name = document.getElementById('loginName').value.trim();
    if (!name) { alert('이름을 입력해주세요'); return; }

    if (currentRole === 'teacher') {
      currentUser = { name, role: 'teacher' };
      showApp();
    } else {
      const cls = document.getElementById('loginClass').value;
      const { data, error } = await db.from('students').select('*').eq('name', name).eq('class', cls).single();
      if (error || !data) {
        alert('등록된 학생을 찾을 수 없습니다.\n선생님께 등록 요청해주세요.');
        return;
      }
      currentUser = { ...data, role: 'student' };
      showApp();
    }
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('visible');
    document.getElementById('userBadge').textContent = currentUser.name + (currentUser.role==='teacher' ? ' 선생님' : ' 학생');

    if (currentUser.role === 'teacher') {
      document.getElementById('teacherApp').style.display = 'block';
      document.getElementById('studentApp').style.display = 'none';
      document.getElementById('teacherNav').style.display = 'flex';
      document.getElementById('studentNav').style.display = 'none';
      loadStudents();
    } else {
      document.getElementById('teacherApp').style.display = 'none';
      document.getElementById('studentApp').style.display = 'block';
      document.getElementById('teacherNav').style.display = 'none';
      document.getElementById('studentNav').style.display = 'flex';
      loadMyHomework();
    }
  }

  function logout() {
    currentUser = null;
    students = []; homeworks = []; submissions = [];
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').classList.remove('visible');
    document.getElementById('loginName').value = '';
    selectRole('teacher');
  }

  // ===== 탭 전환 =====
  function switchTab(tab, el, appId) {
    document.querySelectorAll(`#${appId} .panel`).forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    document.querySelectorAll('.bottom-nav .nav-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (tab === 'homework') loadHomework();
    if (tab === 'students') loadStudents();
  }

  function switchStudentTab(tab, el) {
    document.querySelectorAll('#studentApp .panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    document.querySelectorAll('#studentNav .nav-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  // ===== 학생 관리 =====
  async function loadStudents() {
    const { data } = await db.from('students').select('*').order('name');
    students = data || [];
    await loadSubmissions();
    renderStudents();
    updateStats();
  }

  async function loadSubmissions() {
    const { data } = await db.from('submissions').select('*');
    submissions = data || [];
  }

  function updateStats() {
    document.getElementById('st-total').textContent = students.length;
    document.getElementById('st-a').textContent = students.filter(s => s.class === 'A반').length;
    document.getElementById('st-b').textContent = students.filter(s => s.class === 'B반').length;
  }

  function getSubmitRate(studentId) {
    const s = students.find(s => s.id === studentId);
    if (!s) return 0;
    const relevant = homeworks.filter(h => h.class === '전체' || h.class === s.class);
    if (!relevant.length) return 100;
    const done = relevant.filter(h => submissions.some(sub => sub.homework_id === h.id && sub.student_id === studentId)).length;
    return Math.round(done / relevant.length * 100);
  }

  function renderStudents() {
    const q = document.getElementById('studentSearch').value.toLowerCase();
    const cf = document.getElementById('classFilter').value;
    const filtered = students.filter(s => s.name.toLowerCase().includes(q) && (!cf || s.class === cf));
    updateStats();
    const el = document.getElementById('studentList');
    if (!filtered.length) { el.innerHTML = '<div style="text-align:center;color:#6b7280;padding:24px;font-size:14px">학생이 없습니다</div>'; return; }
    el.innerHTML = filtered.map(s => {
      const rate = getSubmitRate(s.id);
      const col = rate >= 80 ? '#3B6D11' : rate >= 50 ? '#178EF5' : '#E24B4A';
      return `<div class="student-item">
        <div class="avatar">${s.name[0]}</div>
        <div class="student-info">
          <div class="student-name">${s.name} <span class="badge badge-blue" style="margin-left:4px">${s.class}</span></div>
          <div class="student-meta">${s.phone || '연락처 없음'}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <div class="progress-bar" style="flex:1;max-width:120px"><div class="progress-fill" style="width:${rate}%;background:${col}"></div></div>
            <span style="font-size:12px;color:#6b7280">제출률 ${rate}%</span>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">삭제</button>
      </div>`;
    }).join('');
  }

  async function addStudent() {
    const name = document.getElementById('inp-sname').value.trim();
    const cls = document.getElementById('inp-sclass').value;
    const phone = document.getElementById('inp-sphone').value.trim();
    if (!name) { alert('이름을 입력해주세요'); return; }
    const { error } = await db.from('students').insert({ name, class: cls, phone });
    if (error) { alert('오류가 발생했습니다: ' + error.message); return; }
    closeModal('addStudent');
    document.getElementById('inp-sname').value = '';
    document.getElementById('inp-sphone').value = '';
    await loadStudents();
  }

  async function deleteStudent(id) {
    if (!confirm('정말 삭제할까요?')) return;
    await db.from('students').delete().eq('id', id);
    await loadStudents();
  }

  // ===== 숙제 관리 =====
  async function loadHomework() {
    const { data: hw } = await db.from('homeworks').select('*').order('due_date');
    homeworks = hw || [];
    await loadSubmissions();
    renderHomework();
  }

  function renderHomework() {
    const missing = [];
    homeworks.forEach(hw => {
      const targets = students.filter(s => hw.class === '전체' || s.class === hw.class);
      targets.forEach(s => {
        if (!submissions.some(sub => sub.homework_id === hw.id && sub.student_id === s.id)) {
          missing.push(s.name);
        }
      });
    });
    const uniq = [...new Set(missing)];
    const alertEl = document.getElementById('missingAlert');
    alertEl.innerHTML = uniq.length
      ? `<div class="alert alert-warning">⚠️ 미제출 학생: <strong>${uniq.join(', ')}</strong></div>`
      : '';

    const el = document.getElementById('homeworkList');
    if (!homeworks.length) { el.innerHTML = '<div style="text-align:center;color:#6b7280;padding:24px;font-size:14px">출제된 숙제가 없습니다</div>'; return; }

    el.innerHTML = homeworks.map(hw => {
      const targets = students.filter(s => hw.class === '전체' || s.class === hw.class);
      const submitted = targets.filter(s => submissions.some(sub => sub.homework_id === hw.id && sub.student_id === s.id));
      const pct = targets.length ? Math.round(submitted.length / targets.length * 100) : 0;
      const col = pct >= 80 ? '#3B6D11' : pct >= 50 ? '#178EF5' : '#E24B4A';
      const isLate = new Date(hw.due_date) < new Date();
      return `<div class="hw-item">
        <div class="hw-header">
          <div class="hw-title">${hw.title}</div>
          <span class="badge badge-blue">${hw.class}</span>
        </div>
        <div class="hw-meta">
          <span>마감: <strong style="color:${isLate?'#E24B4A':'#1a1a2e'}">${hw.due_date}</strong>${isLate?' (마감됨)':''}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:8px">제출 ${submitted.length}/${targets.length}명 (${pct}%)</div>
        <div class="submit-list">
          ${targets.map(s => {
            const sub = submissions.find(sub => sub.homework_id === hw.id && sub.student_id === s.id);
            const done = !!sub;
            return `<span class="submit-chip badge ${done?'badge-green':'badge-red'}" onclick="openSubmitModal('${hw.id}','${s.id}','${s.name}','${hw.title}')">
              ${s.name} ${done?'✓':'✗'}
            </span>`;
          }).join('')}
        </div>
        ${getSubmittedPhotos(hw.id)}
      </div>`;
    }).join('');
  }

  function getSubmittedPhotos(hwId) {
    const photos = submissions.filter(s => s.homework_id === hwId && s.photo_url);
    if (!photos.length) return '';
    return `<div class="photo-grid" style="margin-top:10px">
      ${photos.map(p => `<div class="photo-thumb" onclick="openImgViewer('${p.photo_url}')"><img src="${p.photo_url}" alt="제출사진"></div>`).join('')}
    </div>`;
  }

  async function addHomework() {
    const title = document.getElementById('inp-htitle').value.trim();
    const cls = document.getElementById('inp-hclass').value;
    const due = document.getElementById('inp-hdue').value;
    if (!title || !due) { alert('제목과 마감일을 입력해주세요'); return; }
    const { error } = await db.from('homeworks').insert({ title, class: cls, due_date: due });
    if (error) { alert('오류: ' + error.message); return; }
    closeModal('addHomework');
    document.getElementById('inp-htitle').value = '';
    await loadHomework();
  }

  // ===== 사진 제출 =====
  function openSubmitModal(hwId, studentId, studentName, hwTitle) {
    currentSubmitHwId = hwId;
    currentSubmitStudentId = studentId;
    pendingPhotos = [];
    document.getElementById('submitPhotoTitle').textContent = '📷 숙제 제출';
    document.getElementById('submitPhotoSub').textContent = `${studentName} · ${hwTitle}`;
    document.getElementById('photoPreviewGrid').innerHTML = '';
    openModal('submitPhoto');
  }

  function handlePhotoSelect(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        pendingPhotos.push({ dataUrl: ev.target.result, file });
        renderPhotoPreview();
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }

  function renderPhotoPreview() {
    document.getElementById('photoPreviewGrid').innerHTML = pendingPhotos.map((p, i) => `
      <div class="photo-thumb" style="position:relative">
        <img src="${p.dataUrl}" alt="미리보기">
        <button onclick="removePhoto(${i})" style="position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;border:none;cursor:pointer;font-size:12px">✕</button>
      </div>`).join('');
  }

  function removePhoto(i) { pendingPhotos.splice(i, 1); renderPhotoPreview(); }

  async function submitPhotos() {
    if (!pendingPhotos.length) { alert('사진을 선택해주세요'); return; }
    const btn = document.querySelector('#modal-submitPhoto .btn-primary');
    btn.textContent = '업로드 중...'; btn.disabled = true;
    try {
      for (const p of pendingPhotos) {
        const fileName = `${currentSubmitHwId}/${currentSubmitStudentId}/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
        const { data: uploadData, error: uploadErr } = await db.storage.from('homework-photos').upload(fileName, p.file, { contentType: p.file.type });
        if (uploadErr) throw uploadErr;
        const { data: urlData } = db.storage.from('homework-photos').getPublicUrl(fileName);
        await db.from('submissions').upsert({ homework_id: currentSubmitHwId, student_id: currentSubmitStudentId, photo_url: urlData.publicUrl }, { onConflict: 'homework_id,student_id' });
      }
      closeModal('submitPhoto');
      await loadHomework();
    } catch(err) {
      alert('업로드 실패: ' + err.message);
    } finally {
      btn.textContent = '제출하기'; btn.disabled = false;
    }
  }

  // ===== 학생용 숙제 =====
  async function loadMyHomework() {
    const { data: hw } = await db.from('homeworks').select('*').or(`class.eq.전체,class.eq.${currentUser.class}`).order('due_date');
    homeworks = hw || [];
    const { data: subs } = await db.from('submissions').select('*').eq('student_id', currentUser.id);
    submissions = subs || [];
    renderMyHomework();
  }

  function renderMyHomework() {
    const unsubmitted = homeworks.filter(h => !submissions.some(s => s.homework_id === h.id));
    const alertEl = document.getElementById('myHwAlert');
    alertEl.innerHTML = unsubmitted.length
      ? `<div class="alert alert-warning">⚠️ 미제출 숙제가 ${unsubmitted.length}개 있습니다!</div>`
      : `<div class="alert alert-info">✅ 모든 숙제를 제출했습니다!</div>`;

    const el = document.getElementById('myHomeworkList');
    if (!homeworks.length) { el.innerHTML = '<div style="text-align:center;color:#6b7280;padding:24px">출제된 숙제가 없습니다</div>'; return; }

    el.innerHTML = homeworks.map(hw => {
      const sub = submissions.find(s => s.homework_id === hw.id);
      const done = !!sub;
      const isLate = new Date(hw.due_date) < new Date();
      return `<div class="my-hw-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:14px;font-weight:600">${hw.title}</div>
            <div style="font-size:12px;color:#6b7280;margin-top:3px">마감: <span style="color:${isLate&&!done?'#E24B4A':'#6b7280'}">${hw.due_date}</span>${isLate?' (마감됨)':''}</div>
          </div>
          <span class="badge ${done?'badge-green':'badge-red'}">${done?'제출완료':'미제출'}</span>
        </div>
        ${sub && sub.photo_url ? `<div class="photo-grid" style="margin-top:10px"><div class="photo-thumb" onclick="openImgViewer('${sub.photo_url}')"><img src="${sub.photo_url}" alt="제출사진"></div></div>` : ''}
        <div class="my-hw-status">
          <button class="btn ${done?'':'btn-primary'} btn-sm" onclick="openSubmitModal('${hw.id}','${currentUser.id}','${currentUser.name}','${hw.title}')">
            ${done ? '📷 다시 제출' : '📷 사진 제출'}
          </button>
        </div>
      </div>`;
    }).join('');
  }

  // ===== 모달 =====
  function openModal(id) { document.getElementById(`modal-${id}`).classList.add('open'); }
  function closeModal(id) { document.getElementById(`modal-${id}`).classList.remove('open'); }
  document.querySelectorAll('.modal-backdrop').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });

  // ===== 이미지 뷰어 =====
  function openImgViewer(src) {
    document.getElementById('viewerImg').src = src;
    document.getElementById('imgViewer').classList.add('open');
  }
  function closeImgViewer() { document.getElementById('imgViewer').classList.remove('open'); }

  // ===== 초기화 =====
  selectRole('teacher');
</script>
</body>
</html>
