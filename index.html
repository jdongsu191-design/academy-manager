<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>학원 관리 시스템</title>
  <meta name="theme-color" content="#178EF5">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}
    :root{--primary:#178EF5;--primary-dark:#1070C2;--success:#3B6D11;--danger:#E24B4A;--bg:#f5f6fa;--border:#e8e9f0}
    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#667eea 0%,#178EF5 100%)}
    .login-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
    .login-logo{text-align:center;margin-bottom:24px}
    .login-logo h1{font-size:24px;font-weight:700;color:#1a1a2e;margin-top:8px}
    .login-logo p{font-size:14px;color:#6b7280;margin-top:4px}
    .role-select{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
    .role-btn{padding:10px 6px;border:2px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:all 0.2s;font-size:12px;font-weight:500}
    .role-btn.active{border-color:var(--primary);background:#E6F1FB;color:var(--primary)}
    .role-btn .icon{font-size:22px;display:block;margin-bottom:3px}
    .input-group{margin-bottom:14px}
    .input-group label{display:block;font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
    .input-group input,.input-group select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border 0.2s;background:#fff;color:#1a1a2e}
    .btn-login{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
    .app{display:none;flex-direction:column;min-height:100vh}
    .app.visible{display:flex}
    .header{background:#fff;padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header h1{font-size:17px;font-weight:700}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-badge{font-size:12px;color:#6b7280;background:#f5f6fa;padding:4px 10px;border-radius:100px}
    .logout-btn{font-size:13px;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px 8px}
    .content{flex:1;padding:16px;max-width:640px;margin:0 auto;width:100%}
    .bottom-nav{background:#fff;border-top:1px solid var(--border);display:flex;position:sticky;bottom:0}
    .nav-tab{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;font-size:11px;color:#9ca3af;border:none;background:none}
    .nav-tab.active{color:var(--primary)}
    .nav-tab .nav-icon{font-size:22px;display:block;margin-bottom:2px}
    .card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
    .card-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .stat-item{background:#fff;border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
    .stat-item .sv{font-size:24px;font-weight:700}
    .stat-item .sl{font-size:11px;color:#6b7280;margin-top:2px}
    .blue{color:var(--primary)}.green{color:var(--success)}.red{color:var(--danger)}.orange{color:#d97706}
    .btn{padding:8px 16px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1a1a2e;transition:all 0.2s}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn-success{background:#3B6D11;color:#fff;border-color:#3B6D11}
    .btn-danger{color:var(--danger);border-color:#fecaca}
    .btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}
    .btn-full{width:100%;padding:14px;font-size:15px;border-radius:12px}
    .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
    .badge-blue{background:#E6F1FB;color:#185FA5}.badge-green{cbackground:#EAF3DE;color:#3B6D11}.badge-red{background:#FCEBEB;color:#A32D2D}
    .user-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .user-item:last-child{border-bottom:none}
    .avatar{width:38px;height:38px;border-radius:50%;background:#E6F1FB;color:#185FA5;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
    .avatar.teacher{background:#EAF3DE;color:#3B6D11}
    .student-info{flex:1}.student-name{font-size:14px;font-weight:600}.student-meta{font-size:12px;color:#6b7280;margin-top:2px}
    .user-actions{display:flex;gap:6px;flex-shrink:0}
    .progress-bar{height:6px;background:#f0f0f0;border-radius:100px;overflow:hidden;margin:6px 0}
    .progress-fill{height:100%;border-radius:100px;transition:width 0.4s}
    .hw-item{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
    .hw-title{font-size:14px;font-weight:600}.hw-meta{font-size:12px;color:#6b7280;margin-bottom:10px}
    .submit-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .submit-chip{padding:4px 10px;border-radius:100px;font-size:12px;cursor:pointer}
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .photo-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer}
    .photo-thumb img{width:100%;height:100%;object-fit:cover}
    .upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#fafafa}
    .alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
    .alert-warning{background:#FAEEDA;color:#854F0B;border:1px solid #FAC775}
    .alert-success{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
    .modal-backdrop.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
    .modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:100px;margin:0 auto 16px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
    .form-group input,.form-group select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:#fff;color:#1a1a2e}
    .img-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;align-items:center;justify-content:center}
    .img-viewer.open{display:flex}
    .img-viewer img{max-width:95vw;}max-height:90vh;border-radius:10px;object-fit:contain}
    .loading{text-align:center;padding:40px;color:#6b7280;font-size:14px}
    .spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .panel{display:none}.panel.active{display:block}
    .search-row{display:flex;gap:8px;margin-bottom:14px}
    .search-input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:#fff}
    select.filter{padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;background:#fff}
    .my-hw-item{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
    .my-hw-status{display:flex;align-items:center;justify-content:space-between=argin-top:10px}
    .status-active{background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
    .status-pending{background:#FAEEDA;color:#854F0B;border:1px solid #FAC775;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
    .status-inactive{background:#FCEBEB.color:#A32D2D;border:1px solid #fecaca;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
# </style>
</head>
